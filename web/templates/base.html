<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PolitiCheck{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <span class="brand">POLITICHECK</span>
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Inicio</a>
    <a href="/analyze" class="{% if request.url.path == '/analyze' %}active{% endif %}">Analizar video</a>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
